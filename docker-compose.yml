services:
  postgres:
    image: postgres:17-alpine
    container_name: culturando-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: culturando
      POSTGRES_PASSWORD: culturando
      POSTGRES_DB: culturando
    ports:
      - "5433:5432"
    volumes:
      - culturando_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U culturando -d culturando"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  culturando_postgres_data:
